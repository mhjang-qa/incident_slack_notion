name: Repair current Busan Bank incident page

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repair-current-incident.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: incident_slack_notion/requirements.txt

      - name: Install dependencies
        run: pip install -r incident_slack_notion/requirements.txt

      - name: Repair Notion page and notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          SLACK_NOTIFICATION_CHANNEL: ${{ vars.SLACK_NOTIFICATION_CHANNEL || 'slice_gh-test' }}
          SLACK_EXPECTED_BOT_NAME: Hanpass QA Bot
          TIMEZONE: Asia/Seoul
          LOG_LEVEL: INFO
        run: >
          python -m incident_slack_notion.repair_page
          --page-id "38f73fbd195181c89ba0dcd03fba66a1"
          --title "[오픈뱅킹] 부산은행 불안정"
          --started-at "2026-06-30 13:41:12"
          --body "2026-06-30 13:41:12부터 오픈뱅킹 부산은행에서 간헐적으로 타임아웃이 발생중(15건)에 있습니다. CS 대응시 참고 바랍니다."
          --category "외부 연계 장애"
          --severity "Minor"
          --scope "특정사용자"
          --slack-link "https://hanpass.enterprise.slack.com/archives/C09FYCDU5BR"
          --notify
