name: Notion incident dashboard pages

on:
  push:
    branches:
      - main
    paths:
      - "notion_dashboard/**"
      - ".github/workflows/dashboard-pages.yml"
  schedule:
    - cron: "37 */6 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: notion-dashboard-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: notion_dashboard/requirements.txt
      - run: pip install -r notion_dashboard/requirements.txt
      - name: Generate standalone dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          TIMEZONE: Asia/Seoul
        run: python -m notion_dashboard.app --generate public/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
