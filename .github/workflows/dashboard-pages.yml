name: Notion incident dashboard pages

on:
  push:
    branches:
      - main
    paths:
      - "notion_dashboard/**"
      - ".github/workflows/dashboard-pages.yml"
  schedule:
    - cron: "37 */6 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: notion-dashboard-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: notion_dashboard/requirements.txt
      - run: pip install -r notion_dashboard/requirements.txt
      - name: Generate standalone dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          TIMEZONE: Asia/Seoul
        run: python -m notion_dashboard.app --generate public/index.html
      - name: Commit dashboard fallback for branch-based GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          cp public/index.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Dashboard fallback is already up to date."
          else
            git commit -m "Update dashboard Pages fallback"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
