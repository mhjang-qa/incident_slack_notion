services:
  - type: web
    name: notion-incident-dashboard
    runtime: python
    buildCommand: pip install -r notion_dashboard/requirements.txt
    startCommand: uvicorn notion_dashboard.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Seoul

